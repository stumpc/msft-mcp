parameters:
- name: ContainerRegistry
  type: string
- name: DeploymentEnvironment
  type: string
- name: ServerName
  type: string
- name: DependsOn
  type: object

jobs:
- deployment: PublishACR
  displayName: "Publish Docker Images to ACR"
  condition: and(succeeded(), ne(variables['Skip.PublishPackage'], 'true'))
  dependsOn: ${{ parameters.DependsOn }}
  timeoutInMinutes: 120
  templateContext:
    type: releaseJob
    isProduction: true
    inputs:
    - input: pipelineArtifact
      artifactName: docker_staging
      targetPath: $(Pipeline.Workspace)/docker_staging
    - input: pipelineArtifact
      artifactName: docker_output_amd64
      targetPath: $(Pipeline.Workspace)/docker_output
    - input: pipelineArtifact
      artifactName: docker_output_arm64
      targetPath: $(Pipeline.Workspace)/docker_output
    - input: pipelineArtifact
      artifactName: build_info
      targetPath: $(Pipeline.Workspace)/build_info
  environment: package-publish
  pool:
    name: azsdk-pool
    image: ubuntu-24.04
    os: linux
  strategy:
    runOnce:
      deploy:
        steps:
        - task: AzureCLI@2
          displayName: Login to ${{ parameters.ContainerRegistry }}
          inputs:
            azureSubscription: "Azure SDK Engineering System"
            scriptType: pscore
            scriptLocation: inlineScript
            inlineScript: |
              az acr login --name ${{ parameters.ContainerRegistry }}

        - pwsh: |
            Write-Host "Setting release variables from build info for Docker release for ${{ parameters.ServerName }}..."
            $buildInfoPath = "$(Pipeline.Workspace)/build_info/build_info.json"
            $buildInfo = Get-Content -Raw -Path $buildInfoPath | ConvertFrom-Json

            $serverName = '${{ parameters.ServerName }}'
            $server = $buildInfo.servers | Where-Object { $_.name -eq $serverName } | Select-Object -First 1
            if (-not $server) {
              Write-Error "Server '$serverName' not found in build info."
              exit 1
            }

            $version = $server.version
            $cliName = $server.cliName
            $dockerImageName = $server.dockerImageName

            Write-Host "##vso[task.setvariable variable=DockerImageVersion;isOutput=true]$version"
            Write-Host "##vso[task.setvariable variable=CliName;isOutput=true]$cliName"
            Write-Host "##vso[task.setvariable variable=DockerImageName;isOutput=true]$dockerImageName"
          name: SetReleaseVariables

        - task: PowerShell@2
          displayName: Load Docker images from tarballs
          inputs:
            pwsh: true
            filePath: $(Pipeline.Workspace)/docker_staging/Load-DockerImages.ps1
            arguments: >
              -CliName '$(SetReleaseVariables.CliName)'
              -ImageName '$(SetReleaseVariables.DockerImageName)'
              -TarDirectory '$(Pipeline.Workspace)/docker_output'

        - task: 1ES.PushContainerImage@1
          displayName: Push Docker image (amd64)
          inputs:
            image: $(SetReleaseVariables.DockerImageName):amd64
            remoteImage: ${{ parameters.ContainerRegistry }}.azurecr.io/${{ parameters.DeploymentEnvironment }}/$(SetReleaseVariables.DockerImageName):$(SetReleaseVariables.DockerImageVersion)-amd64

        - task: 1ES.PushContainerImage@1
          displayName: Push Docker image (arm64)
          inputs:
            image: $(SetReleaseVariables.DockerImageName):arm64
            remoteImage: ${{ parameters.ContainerRegistry }}.azurecr.io/${{ parameters.DeploymentEnvironment }}/$(SetReleaseVariables.DockerImageName):$(SetReleaseVariables.DockerImageVersion)-arm64

        - task: PowerShell@2
          displayName: Create and push multi-arch manifests
          inputs:
            pwsh: true
            filePath: $(Pipeline.Workspace)/docker_staging/Publish-DockerManifests.ps1
            arguments: >
              -Version '$(SetReleaseVariables.DockerImageVersion)'
              -BaseRepo '${{ parameters.ContainerRegistry }}.azurecr.io/${{ parameters.DeploymentEnvironment }}/$(SetReleaseVariables.DockerImageName)'
              -Architectures 'amd64','arm64'
